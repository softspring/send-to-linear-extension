<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Send To Linear Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <p class="eyebrow">Chrome Extension</p>
        <h1>Send To Linear</h1>
        <p class="intro">
          Connect your Linear account with OAuth, sync your teams, then highlight text in Chrome
          and use the right-click menu: <strong>Send To Linear</strong>.
        </p>

        <form id="settings-form" class="form">
          <label class="field">
            <span>Linear OAuth client ID</span>
            <input
              id="client-id"
              name="clientId"
              type="text"
              autocomplete="off"
              placeholder="Paste your Linear OAuth client ID"
            >
            <small class="hint">
              Register a Linear OAuth app and add this extension redirect URL in Linear:
              <code id="redirect-uri"></code>
            </small>
          </label>

          <p id="auth-summary" class="hint"></p>

          <label class="checkbox">
            <input id="open-issue" name="openIssueAfterCreate" type="checkbox">
            <span>Open the created issue in a new tab</span>
          </label>

          <div class="actions">
            <button type="submit" id="connect-linear" class="button primary">Connect to Linear</button>
            <button type="button" id="refresh-teams" class="button secondary">Refresh teams</button>
            <button type="button" id="disconnect-linear" class="button tertiary">Disconnect</button>
          </div>
        </form>

        <p id="status" class="status" aria-live="polite"></p>

        <section class="teams">
          <div class="teams-header">
            <h2>Cached teams</h2>
            <span id="team-count" class="count">0</span>
          </div>
          <ul id="team-list" class="team-list"></ul>
        </section>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
